```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoDoc AI</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      background: #111827;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 0 30px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: 50px;
      margin-bottom: 10px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 40px;
      font-size: 18px;
    }

    input {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background: #1e293b;
      color: white;
      font-size: 16px;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background: #3b82f6;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }

    .result {
      margin-top: 30px;
      background: #1e293b;
      padding: 25px;
      border-radius: 15px;
      display: none;
    }

    .file {
      background: #334155;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .readme {
      margin-top: 25px;
      background: #0f172a;
      padding: 20px;
      border-radius: 12px;
      white-space: pre-wrap;
      line-height: 1.6;
      color: #cbd5e1;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>AutoDoc AI</h1>

    <p class="subtitle">
      AI tool that analyzes GitHub repositories and generates documentation automatically.
    </p>

    <input
      type="text"
      id="repoInput"
      placeholder="Paste GitHub Repository URL..."
    />

    <button onclick="analyzeRepo()">
      Analyze Repository
    </button>

    <div class="result" id="resultBox">

      <h2>Project Structure</h2>

      <div id="filesContainer"></div>

      <div class="readme" id="readmeBox"></div>

    </div>

  </div>

  <script>

    function analyzeRepo() {

      const repoUrl = document.getElementById("repoInput").value;

      if (!repoUrl) {
        alert("Please enter a GitHub repository URL.");
        return;
      }

      const fakeFiles = [
        "main.py",
        "database.py",
        "auth.py",
        "routes/users.py",
        "services/ai_engine.py",
        "README.md"
      ];

      const filesContainer = document.getElementById("filesContainer");

      filesContainer.innerHTML = "";

      fakeFiles.forEach(file => {

        filesContainer.innerHTML += `
          <div class="file">${file}</div>
        `;

      });

      const readme = `
# Auto Generated Documentation

## Project Overview
This repository was analyzed successfully by AutoDoc AI.

## Main Features
- AI Documentation
- Repository Structure Analysis
- Developer Onboarding
- Architecture Visualization

## Technologies
- Python
- FastAPI
- OpenAI API
- GitHub API
      `;

      document.getElementById("readmeBox").textContent = readme;

      document.getElementById("resultBox").style.display = "block";
    }

  </script>

</body>
</html>
```
